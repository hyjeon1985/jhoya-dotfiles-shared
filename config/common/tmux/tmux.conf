# jhoya-dotfiles tmux baseline

# Use sensible defaults for TUI apps and fast key handling.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
set -sg escape-time 0
set -g focus-events on
set -s set-clipboard external
set -g set-titles on
set -g set-titles-string "@#S"

# Make tmux easier for first-time use.
set -g mouse on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# More memorable split keys.
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Pane navigation and quick reload.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Use tmux copy-mode as the single path for remote clipboard copies.
bind -T copy-mode-vi Space send-keys -X begin-selection
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Configure official Catppuccin tmux theme.
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "slanted"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator "█"
set -g @catppuccin_date_time_text " %Y-%m-%d %H:%M"

# Keep status readable while letting Catppuccin own the palette.
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 100
set -g status-left ""

if-shell -F '#{>=:#{version},3.2}' \
  "if-shell '[ -f \"$HOME/.config/tmux/plugins/catppuccin/tmux/catppuccin_tmux.conf\" ]' \"run-shell -C 'source-file ~/.config/tmux/plugins/catppuccin/tmux/catppuccin_options_tmux.conf; source-file ~/.config/tmux/plugins/catppuccin/tmux/catppuccin_tmux.conf'; set -g status-right '#{E:@catppuccin_status_session}'; set -ag status-right '#{E:@catppuccin_status_date_time}'\" \"set -g status-style 'bg=#24273a,fg=#cad3f5'; set -g status-right ' #S  %Y-%m-%d %H:%M '; set -g window-status-format '#[bg=#494d64,fg=#cad3f5] #I #W '; set -g window-status-current-format '#[bg=#c6a0f6,fg=#181926] #I #W '\"" \
  "set -g status-style 'bg=#24273a,fg=#cad3f5'; set -g status-right ' #S  %Y-%m-%d %H:%M '; set -g window-status-format '#[bg=#494d64,fg=#cad3f5] #I #W '; set -g window-status-current-format '#[bg=#c6a0f6,fg=#181926] #I #W '"
